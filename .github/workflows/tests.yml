name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests and save log
        id: run_tests
        run: pytest tests/ -v | tee test-log.txt
        continue-on-error: true

      - name: Upload test log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: test-log.txt

      - name: Check test result
        if: always()
        run: |
          if grep -q "FAILED" test-log.txt || grep -q "ERROR" test-log.txt; then
            echo "tests_failed=true" >> $GITHUB_ENV
          else
            echo "tests_failed=false" >> $GITHUB_ENV
          fi

      - name: Send failure email
        if: env.tests_failed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Tests Failed - ${{ github.repository }}"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: "Pytest failed on commit ${{ github.sha }} in ${{ github.repository }}. Check the workflow run and attached log artifact: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          attachments: test-log.txt
